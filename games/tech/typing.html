<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ฝึกพิมพ์ — บ้านคำไผ่</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d1117;--bg2:#161b22;--surface:#1c2128;--border:#30363d;
         --text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#e53935;--yellow:#ffd700;--blue:#2f86f7}
    body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    .nav{background:rgba(13,17,23,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;z-index:10}
    .back{text-decoration:none;color:var(--muted);font-size:13px;padding:4px 12px;
      border:1px solid var(--border);border-radius:8px;transition:.2s}
    .back:hover{color:var(--text);border-color:var(--red)}
    .nav-title{font-weight:700;font-size:15px}
    main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:20px}
    .hud{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .hud-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:8px 20px;text-align:center;min-width:80px}
    .hud-val{font-size:1.5rem;font-weight:700;display:block}
    .hud-val.y{color:var(--yellow)}.hud-val.g{color:var(--green)}.hud-val.b{color:#90caf9}
    .hud-label{font-size:11px;color:var(--muted);display:block}
    /* TYPING AREA */
    .target-area{background:var(--surface);border:1px solid var(--border);border-radius:16px;
      padding:20px 24px;width:100%;max-width:600px;line-height:2;font-size:1.2rem;
      letter-spacing:.05em;min-height:80px}
    .ch{transition:background .1s}
    .ch.done{color:#81c784}
    .ch.current{background:rgba(47,134,247,.3);border-radius:3px;color:var(--blue)}
    .ch.wrong{background:rgba(229,57,53,.3);border-radius:3px;color:var(--red)}
    .ch.pending{color:var(--muted)}
    input[type=text]{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px}
    .progress-bar{width:100%;max-width:600px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));width:0%;transition:width .3s}
    .btn{background:var(--green);color:#000;border:none;border-radius:12px;
      padding:12px 28px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
    .btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(63,185,80,.4)}
    .result-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;
      padding:28px 32px;text-align:center;width:100%;max-width:500px;display:none}
    .result-panel.show{display:block}
    .result-stat{font-size:2.5rem;font-weight:700;color:var(--yellow)}
    .result-label{font-size:13px;color:var(--muted);margin-bottom:16px;display:block}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
    .stat-box{background:var(--bg2);border-radius:12px;padding:12px;text-align:center}
    .stat-val{font-size:1.6rem;font-weight:700}.stat-lbl{font-size:11px;color:var(--muted)}
    .btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#b71c1c}
    .btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}
    .btn-outline:hover{background:var(--border)}
    .keyboard-hint{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
      padding:12px 18px;font-size:13px;color:var(--muted);text-align:center;max-width:600px;width:100%}
  </style>
</head>
<body>
<nav class="nav">
  <a class="back" href="../index.html">← กลับ</a>
  <span class="nav-title">⌨️ ฝึกพิมพ์</span>
  <span style="width:60px"></span>
</nav>
<main id="game-screen">
  <div class="hud">
    <div class="hud-box"><span class="hud-val y" id="wpm">0</span><span class="hud-label">WPM</span></div>
    <div class="hud-box"><span class="hud-val b" id="timer">60</span><span class="hud-label">วินาที</span></div>
    <div class="hud-box"><span class="hud-val g" id="acc">100%</span><span class="hud-label">ความแม่นยำ</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="target-area" id="target" onclick="document.getElementById('type-input').focus()"></div>
  <input type="text" id="type-input" autofocus autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
  <div class="keyboard-hint">💡 คลิกที่กล่องข้อความแล้วพิมพ์ตาม — กด <strong>Backspace</strong> เพื่อแก้ไข</div>
</main>

<div class="result-panel" id="result-panel">
  <h2 style="margin-bottom:4px">📊 ผลการฝึกพิมพ์</h2>
  <div class="result-stat" id="final-wpm">0</div>
  <span class="result-label">คำต่อนาที (WPM)</span>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-val" id="res-acc" style="color:var(--green)">0%</div><div class="stat-lbl">ความแม่นยำ</div></div>
    <div class="stat-box"><div class="stat-val" id="res-correct" style="color:var(--blue)">0</div><div class="stat-lbl">ถูก (ตัวอักษร)</div></div>
    <div class="stat-box"><div class="stat-val" id="res-wrong" style="color:var(--red)">0</div><div class="stat-lbl">ผิด</div></div>
  </div>
  <button class="btn btn-red" onclick="restartGame()" style="margin:4px">🔄 เล่นใหม่</button>
  <button class="btn btn-outline" onclick="location.href='../index.html'" style="margin:4px">🏠 กลับ</button>
</div>
<script>
const SENTENCES=[
  "the quick brown fox jumps over the lazy dog",
  "practice makes perfect every single day",
  "learning is the key to a brighter future",
  "school is a place where we grow and learn",
  "type fast and accurate to win the game",
  "computers are tools that help us learn better",
  "read books every day to become smarter",
  "math and science are important subjects",
  "friendship and kindness make the world better",
  "never give up keep trying your best always"
];

let text="",pos=0,wrong=false,started=false,timerID=null;
let timeLeft=60,totalWrong=0,totalChars=0;

function loadSentence(){
  text=SENTENCES[Math.floor(Math.random()*SENTENCES.length)];
  pos=0;wrong=false;renderText();
}

function renderText(){
  document.getElementById("target").innerHTML=text.split("").map((ch,i)=>{
    let cls="ch ";
    if(i<pos) cls+="done";
    else if(i===pos) cls+=(wrong?"wrong":"current");
    else cls+="pending";
    return `<span class="${cls}">${ch==" "?"&nbsp;":ch}</span>`;
  }).join("");
  document.getElementById("prog").style.width=(pos/text.length*100)+"%";
}

document.getElementById("type-input").addEventListener("keydown",e=>{
  if(!started){started=true;startTimer();}
  const ch=text[pos];
  if(e.key==="Backspace"){
    if(wrong){wrong=false;renderText();}
    else if(pos>0){pos--;renderText();}
    e.preventDefault();return;
  }
  if(e.key.length!==1)return;
  e.preventDefault();
  if(e.key===ch){
    if(wrong){totalWrong++;wrong=false;}
    totalChars++;pos++;
    if(pos>=text.length){loadSentence();}
    else renderText();
  }else{
    wrong=true;renderText();
  }
  updateHUD();
});

function updateHUD(){
  const elapsed=60-timeLeft;
  const wpm=elapsed>0?Math.round((totalChars/5)/(elapsed/60)):0;
  const acc=totalChars+totalWrong>0?Math.round(totalChars/(totalChars+totalWrong)*100):100;
  document.getElementById("wpm").textContent=wpm;
  document.getElementById("acc").textContent=acc+"%";
}

function startTimer(){
  timerID=setInterval(()=>{
    timeLeft--;document.getElementById("timer").textContent=timeLeft;
    updateHUD();
    if(timeLeft<=0){clearInterval(timerID);showResult();}
  },1000);
}

function showResult(){
  const elapsed=60;
  const wpm=Math.round((totalChars/5)/(elapsed/60));
  const acc=totalChars+totalWrong>0?Math.round(totalChars/(totalChars+totalWrong)*100):100;
  document.getElementById("final-wpm").textContent=wpm;
  document.getElementById("res-acc").textContent=acc+"%";
  document.getElementById("res-correct").textContent=totalChars;
  document.getElementById("res-wrong").textContent=totalWrong;
  document.getElementById("game-screen").style.display="none";
  document.getElementById("result-panel").classList.add("show");
}

function restartGame(){
  timeLeft=60;totalWrong=0;totalChars=0;started=false;clearInterval(timerID);
  document.getElementById("timer").textContent=60;
  document.getElementById("wpm").textContent=0;
  document.getElementById("acc").textContent="100%";
  document.getElementById("prog").style.width="0%";
  document.getElementById("game-screen").style.display="flex";
  document.getElementById("result-panel").classList.remove("show");
  loadSentence();
  document.getElementById("type-input").focus();
}

loadSentence();
document.getElementById("type-input").focus();
</script>
</body>
</html>
