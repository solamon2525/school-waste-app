<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>นักตกปลาล่ามาตรา V11.6 - Adaptive Difficulty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
            background: #0c4a6e;
            margin: 0;
            user-select: none;
            touch-action: none;
        }
        .sea-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #38bdf8 0%, #075985 50%, #082f49 100%);
            overflow: hidden;
        }
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: float-up var(--duration) linear infinite;
        }
        @keyframes float-up { from { transform: translateY(110vh) scale(0.5); opacity: 0.6; } to { transform: translateY(-10vh) scale(1.5); opacity: 0; } }

        #player {
            position: absolute;
            width: 140px;
            height: 100px;
            z-index: 50;
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.5));
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .cooldown-ring {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 44px;
        }
        .ring-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 4; }
        .ring-fill { 
            fill: none; stroke: #fbbf24; stroke-width: 4; 
            stroke-dasharray: 100; stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.1s linear;
            stroke-linecap: round;
        }

        .lives-container { display: flex; gap: 8px; margin-top: 8px; justify-content: center; }
        .heart-icon { width: 32px; height: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); transition: all 0.4s ease; animation: heart-pulse 2s infinite; }
        .heart-icon.lost { filter: grayscale(1) opacity(0.2); transform: scale(0.5); }
        @keyframes heart-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .fish, .trash, .rock, .net, .mine, .oxygen, .enemy-shark, .octopus, .projectile { position: absolute; z-index: 10; filter: drop-shadow(0 5px 12px rgba(0,0,0,0.3)); }
        .net { width: 60px; height: 60px; z-index: 45; animation: spin 0.5s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .mine-light, .shark-eye-glow { animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { fill: #450a0a; } to { fill: #ef4444; } }

        .fish-label {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 4px 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            color: #0369a1;
            white-space: nowrap;
            border: 2px solid #7dd3fc;
            z-index: 20;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .anim-tail { transform-origin: 80% 50%; animation: tail-wag 0.5s ease-in-out infinite alternate; transform-box: fill-box; }
        .anim-fins-flow { transform-origin: 20% 50%; animation: fin-flow 1.2s ease-in-out infinite alternate; transform-box: fill-box; }
        .propeller-anim { transform-origin: 22px 50px; animation: prop-spin 0.15s linear infinite; }
        
        @keyframes tail-wag { from { transform: rotate(-20deg); } to { transform: rotate(20deg); } }
        @keyframes prop-spin { from { transform: rotateX(0deg); } to { transform: rotateX(360deg); } }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 3rem;
            text-align: center;
            max-width: 90%;
            width: 620px;
            border: 10px solid #fbbf24;
        }
        .category-btn {
            position: relative;
            background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
            border: 2px solid #e2e8f0;
            box-shadow: 0 4px 0 #cbd5e1;
            transition: all 0.1s;
            font-weight: 800;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70px;
        }
        .category-btn:hover { border-color: #fbbf24; background: #fffcf0; transform: translateY(-2px); }

        .key-label {
            position: absolute;
            top: 4px;
            left: 8px;
            font-size: 11px;
            color: #38bdf8;
            font-weight: 900;
            opacity: 0.7;
        }

        .controls-ui {
            position: absolute;
            bottom: 40px; left: 0; right: 0;
            padding: 0 40px;
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 60;
            pointer-events: none;
        }
        .joystick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; pointer-events: auto; }
        .btn-dir, .btn-shoot {
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.7);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            color: white; backdrop-filter: blur(8px);
        }
        .btn-dir { width: 70px; height: 70px; font-size: 28px; }
        .btn-shoot { width: 120px; height: 120px; font-size: 24px; font-weight: 900; background: rgba(251, 191, 36, 0.5); border-color: rgba(251, 191, 36, 0.8); pointer-events: auto; }

        .stunned { filter: grayscale(1) brightness(0.7) !important; animation: shake-hard 0.1s infinite; }
        .invincible { animation: blink-fast 0.2s infinite; }
        @keyframes blink-fast { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        @keyframes shake-hard { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
        
        .popup-text {
            position: absolute;
            font-weight: 900;
            font-size: 32px;
            pointer-events: none;
            z-index: 150;
            animation: popup-move 1.2s forwards;
            text-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        @keyframes popup-move { 0% { transform: translateY(0) scale(1); opacity: 0; } 20% { transform: translateY(-20px) scale(1.8); opacity: 1; } 100% { transform: translateY(-120px) scale(1.2); opacity: 0; } }

        #countdown {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 150px;
            font-weight: 900;
            color: white;
            z-index: 200;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: none;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #38bdf8;
            margin-bottom: 8px;
        }
        .ranking-item.highlight { background: #fef3c7; border-left-color: #fbbf24; transform: scale(1.02); }
    </style>
</head>
<body id="body">

<div class="sea-container" id="gameArea">
    <!-- UI Overlay -->
    <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-50 pointer-events-none">
        <div class="bg-white/95 p-4 rounded-3xl shadow-2xl border-4 border-yellow-400 pointer-events-auto flex gap-8 backdrop-blur-md">
            <div class="text-center">
                <div class="text-yellow-600 text-[10px] font-black uppercase tracking-widest">คะแนน</div>
                <div class="text-sky-800 font-black text-4xl" id="score">0</div>
                <div class="lives-container" id="livesContainer"></div>
            </div>
            <div class="border-l-4 border-yellow-100 pl-8 text-center">
                <div class="text-yellow-600 text-[10px] font-black uppercase tracking-widest">เวลา</div>
                <div class="text-orange-600 font-black text-4xl w-24" id="timer">100</div>
            </div>
        </div>
        <div class="hidden lg:block bg-white/95 p-4 rounded-3xl shadow-2xl border-4 border-yellow-400 text-center pointer-events-auto backdrop-blur-md">
            <h1 class="font-black text-sky-900 text-2xl">⚓ เรือดำน้ำล่ามาตรา V11.6</h1>
            <p class="text-sm text-sky-600 font-bold" id="difficultyLabel">ความยากถัดไป: 30 วิ</p>
        </div>
    </div>

    <div id="countdown">3</div>

    <!-- Submarine Player -->
    <div id="player">
        <div class="cooldown-ring">
            <svg viewBox="0 0 40 40">
                <circle class="ring-bg" cx="20" cy="20" r="16"/>
                <circle id="cooldownFill" class="ring-fill" cx="20" cy="20" r="16" transform="rotate(-90 20 20)"/>
            </svg>
        </div>
        <svg viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg" id="subSvg">
            <defs>
                <linearGradient id="subBodyGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#fde047"/><stop offset="100%" style="stop-color:#ca8a04"/></linearGradient>
                <radialGradient id="glassGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#e0f2fe"/><stop offset="100%" style="stop-color:#38bdf8"/></radialGradient>
            </defs>
            <g class="propeller-anim"><path d="M15,35 L25,65 M15,65 L25,35" stroke="#451a03" stroke-width="6" stroke-linecap="round"/></g>
            <rect x="22" y="45" width="10" height="10" rx="2" fill="#854d0e"/>
            <path d="M30,30 C30,15 130,15 130,50 C130,85 30,85 30,70 Z" fill="url(#subBodyGrad)" stroke="#854d0e" stroke-width="2"/>
            <rect x="65" y="18" width="35" height="20" rx="8" fill="#facc15" stroke="#854d0e" stroke-width="2"/>
            <path d="M82,18 L82,5 L95,5" fill="none" stroke="#854d0e" stroke-width="5" stroke-linecap="round"/>
            <circle cx="105" cy="50" r="18" fill="url(#glassGrad)" stroke="#075985" stroke-width="3"/>
            <path d="M98,42 Q105,35 112,42" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
        </svg>
    </div>

    <!-- Mobile Controls -->
    <div class="controls-ui lg:hidden">
        <div class="joystick-grid">
            <div></div><button class="btn-dir" id="btnUp">▲</button><div></div>
            <button class="btn-dir" id="btnLeft">◀</button>
            <button class="btn-dir" id="btnDown">▼</button>
            <button class="btn-dir" id="btnRight">▶</button>
        </div>
        <div class="shoot-btn-container">
            <button class="btn-shoot" id="shootBtn">ยิง!</button>
        </div>
    </div>

    <!-- Screens -->
    <div id="startScreen" class="absolute inset-0 z-[60] flex items-center justify-center bg-sky-950/70 backdrop-blur-xl">
        <div class="bg-white p-12 rounded-[3.5rem] text-center shadow-2xl border-8 border-yellow-400 max-w-sm mx-4">
            <div class="text-8xl mb-6">🚢</div>
            <h2 class="text-4xl font-black text-sky-900 mb-6">เริ่มภารกิจใหม่!</h2>
            <input type="text" id="playerNameInput" maxlength="10" placeholder="ชื่อเล่นกัปตัน" class="w-full px-6 py-5 mb-6 rounded-2xl border-4 border-sky-100 outline-none text-center text-2xl font-bold text-sky-800">
            <p class="text-sky-600 mb-8 text-sm font-bold">ความยากพุ่งขึ้นทุก 30, 60, 90 วินาที! ⏳<br>ปราบฉลามยักษ์เพื่อรักษาความปลอดภัย!</p>
            <button id="finalStartBtn" class="w-full bg-yellow-400 text-sky-900 font-black py-5 px-10 rounded-3xl text-3xl shadow-[0_12px_0_#ca8a04] active:translate-y-2 active:shadow-none transition-all">เริ่มภารกิจ</button>
        </div>
    </div>

    <div id="gameOverScreen" class="hidden absolute inset-0 z-[60] flex items-center justify-center bg-sky-950/85 backdrop-blur-2xl">
        <div class="bg-white p-8 rounded-[3.5rem] text-center shadow-2xl border-8 border-yellow-400 max-w-md w-full mx-4 overflow-y-auto max-h-[90vh]">
            <div class="text-7xl mb-4" id="endIcon">🏁</div>
            <h2 class="text-4xl font-black text-sky-900 mb-2" id="endMessage">จบภารกิจ!</h2>
            <div class="text-sky-600 font-bold text-xl mb-4"><span id="endPlayerName">...</span> ได้ <span class="text-sky-800 font-black text-5xl" id="finalScore">0</span> คะแนน</div>
            <div class="bg-sky-50 rounded-3xl p-6 mb-8 border-2 border-sky-100">
                <h3 class="text-sky-800 font-black text-2xl mb-4 border-b-2 border-sky-200 pb-2">🎖️ อันดับสูงสุด</h3>
                <div id="leaderboardList" class="space-y-3"></div>
            </div>
            <button id="retryBtn" class="w-full bg-orange-500 text-white font-black py-5 px-10 rounded-3xl text-2xl shadow-[0_10px_0_#9a3412] active:translate-y-2 transition-all">เล่นอีกครั้ง</button>
        </div>
    </div>

    <!-- Catch Modal -->
    <div id="catchModal" class="modal">
        <div id="modalBox" class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <div class="text-sky-700 font-bold bg-sky-50 px-4 py-1 rounded-full">คะแนน: <span id="modalScoreText">0</span></div>
                <div class="text-red-500 font-bold bg-red-50 px-4 py-1 rounded-full">เวลาคำถาม: <span id="modalTimer">5.0</span>วิ</div>
            </div>
            <div class="w-full h-3 bg-gray-100 rounded-full mb-6 overflow-hidden"><div id="qTimerBar" class="h-full bg-sky-400 transition-all duration-100"></div></div>
            <div id="targetWord" class="text-7xl font-black text-sky-600 mb-10 tracking-tighter drop-shadow-sm">...</div>
            <div class="grid grid-cols-3 gap-4" id="categoryGrid"></div>
            <div id="feedback" class="mt-8 font-black text-2xl py-3 rounded-2xl opacity-0 transition-opacity">...</div>
        </div>
    </div>

    <div id="fishTank"></div>
    <div id="netTank"></div>
    <div id="obstacleTank"></div>
    <div id="mineTank"></div>
    <div id="oxygenTank"></div>
    <div id="enemyTank"></div>
    <div id="enemyProjectileTank"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'sub-fishing-v116';

    // --- DOM REFERENCES (DECLARE AT TOP) ---
    const countdownEl = document.getElementById('countdown'), playerEl = document.getElementById('player'), cooldownFill = document.getElementById('cooldownFill'), scoreEl = document.getElementById('score'), timerEl = document.getElementById('timer'), livesContainer = document.getElementById('livesContainer');
    const fishTank = document.getElementById('fishTank'), netTank = document.getElementById('netTank'), enemyTank = document.getElementById('enemyTank'), enemyProjectileTank = document.getElementById('enemyProjectileTank'), obstacleTank = document.getElementById('obstacleTank'), mineTank = document.getElementById('mineTank'), oxygenTank = document.getElementById('oxygenTank');
    const catchModal = document.getElementById('catchModal'), feedbackEl = document.getElementById('feedback'), shootBtn = document.getElementById('shootBtn'), finalStartBtn = document.getElementById('finalStartBtn'), retryBtn = document.getElementById('retryBtn');
    const modalScoreText = document.getElementById('modalScoreText'), modalTimer = document.getElementById('modalTimer'), targetWordEl = document.getElementById('targetWord'), qTimerBar = document.getElementById('qTimerBar');

    // --- GLOBAL STATE ---
    let score = 0, timeLeft = 100, lives = 5, gameActive = false, paused = false, stunTime = 0, isInvincible = false, gameDifficultyLevel = 0;
    let timeToNextDifficulty = 30, currentDifficultyInterval = 30; // Adaptive Interval
    let playerName = "กัปตัน", currentUser = null;
    let fishList = [], netList = [], obstacleList = [], trashList = [], mineList = [], oxygenList = [], octopusList = [], enemySharkList = [], enemyProjectileList = [];
    const player = { x: 0, y: 0, speed: 8.5, w: 140, h: 100, dir: 1 };
    const keyState = {};
    let lastShootTime = 0;
    const SHOOT_COOLDOWN = 4000;
    let spawnIntervals = [], mainTimerInterval;

    const rawWordBank = [
        { word: 'ปลา', cat: 'แม่ กกา' }, { word: 'เสือ', cat: 'แม่ กกา' }, { word: 'นก', cat: 'แม่ กก' }, { word: 'รถ', cat: 'แม่ กด' },
        { word: 'ตำรวจ', cat: 'แม่ กด' }, { word: 'กบ', cat: 'แม่ กบ' }, { word: 'บ้าน', cat: 'แม่ กน' }, { word: 'ส้ม', cat: 'แม่ กม' },
        { word: 'ยาย', cat: 'แม่ เกย' }, { word: 'แก้ว', cat: 'แม่ เกอว' }
    ];
    const categories = ['แม่ กกา', 'แม่ กก', 'แม่ กด', 'แม่ กบ', 'แม่ กง', 'แม่ กน', 'แม่ กม', 'แม่ เกย', 'แม่ เกอว'];
    const colors = ['#f87171', '#fb923c', '#fbbf24', '#4ade80', '#2dd4bf', '#818cf8', '#f472b6', '#a78bfa'];

    // --- Audio System ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(f, t, d, v) {
        try { if(audioCtx.state === 'suspended') audioCtx.resume(); const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); } catch(e) {}
    }
    const sfx = {
        shoot: () => playSfx(300, 'square', 0.1, 0.2), hitFish: () => { playSfx(600, 'sine', 0.1, 0.2); setTimeout(() => playSfx(900, 'sine', 0.1, 0.2), 100); },
        hitRock: () => playSfx(100, 'sawtooth', 0.4, 0.3), hitMine: () => { playSfx(60, 'sawtooth', 0.8, 0.5); playSfx(120, 'square', 0.4, 0.3); },
        explode: () => { playSfx(45, 'sawtooth', 1.5, 0.8); playSfx(85, 'sawtooth', 1.0, 0.5); }, hitOxygen: () => { playSfx(500, 'sine', 0.1, 0.3); playSfx(800, 'sine', 0.1, 0.2); },
        correct: () => playSfx(800, 'triangle', 0.4, 0.2), wrong: () => playSfx(150, 'sawtooth', 0.5, 0.3), countdown: (f) => playSfx(f, 'sine', 0.2, 0.3)
    };

    // --- CORE MECHANICS FUNCTIONS (TOP-LEVEL) ---

    function showPopup(txt, x, y, color) { const el = document.createElement('div'); el.className = 'popup-text'; el.textContent = txt; el.style.left = x+'px'; el.style.top = y+'px'; el.style.color = color; document.body.appendChild(el); setTimeout(() => el.remove(), 1200); }

    function updateLivesUI() {
        livesContainer.innerHTML = '';
        for(let i=0; i<5; i++) {
            const heart = document.createElement('div');
            heart.className = `heart-icon ${i >= lives ? 'lost' : ''}`;
            heart.innerHTML = `<svg viewBox="0 0 32 32" width="32" height="32"><path d="M16,28.2 L13.7,26.1 C5.6,18.8 0.3,14 0.3,8.1 C0.3,3.3 4.1,0.5 8.9,0.5 C11.6,0.5 14.3,1.8 16,3.8 C17.7,1.8 20.4,0.5 23.1,0.5 C27.9,0.5 31.7,3.3 31.7,8.1 C31.7,14 26.4,18.8 18.3,26.2 L16,28.2 Z" fill="#ef4444" stroke="#7f1d1d" stroke-width="2"/></svg>`;
            livesContainer.appendChild(heart);
        }
    }

    function endGame(reason = "") {
        if(!gameActive) return; gameActive = false; sfx.explode();
        spawnIntervals.forEach(i => clearInterval(i)); 
        if(mainTimerInterval) clearInterval(mainTimerInterval); 
        document.getElementById('gameOverScreen').classList.remove('hidden'); 
        document.getElementById('finalScore').textContent = score; document.getElementById('endPlayerName').textContent = playerName;
        document.getElementById('endMessage').textContent = reason;
        if(currentUser) {
            try {
                const lb = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                addDoc(lb, { name: playerName, score: score, ts: Date.now() }).then(() => {
                    getDocs(lb).then(snap => {
                        let data = []; snap.forEach(d => data.push(d.data()));
                        data.sort((a,b) => b.score - a.score);
                        document.getElementById('leaderboardList').innerHTML = data.slice(0,5).map((e,i) => `<div class="ranking-item ${e.name === playerName && e.score === score ? 'highlight' : ''}"><span class="font-bold text-sky-800">${i+1}. ${e.name}</span><b class="text-sky-600 text-xl">${e.score}</b></div>`).join('');
                    });
                });
            } catch(e) {}
        }
    }

    function takeDamage(p = 1, t = 10) {
        if(isInvincible || !gameActive) return;
        lives--; score = Math.max(0, score - p); timeLeft = Math.max(0, timeLeft - t);
        scoreEl.textContent = score; timerEl.textContent = timeLeft; updateLivesUI();
        isInvincible = true; playerEl.classList.add('invincible');
        setTimeout(() => { if(gameActive) { isInvincible = false; playerEl.classList.remove('invincible'); } }, 2000);
        if(lives <= 0) endGame("เรืออับปาง!");
    }

    function checkAnswer(selected) { 
        if(feedbackEl.classList.contains('opacity-100') || !gameActive) return; 
        feedbackEl.classList.add('opacity-100'); 
        const currentWord = targetWordEl.textContent; 
        const wordObj = rawWordBank.find(w => w.word === currentWord);
        const currentCat = wordObj ? wordObj.cat : ""; 
        if(selected === currentCat) { 
            score += 10; timeLeft += 1; scoreEl.textContent = score; timerEl.textContent = timeLeft; sfx.correct(); 
            showPopup("+1วิ", window.innerWidth/2, window.innerHeight/2 - 80, "#22c55e");
            feedbackEl.textContent = 'ถูกต้อง 🎉'; feedbackEl.className = 'mt-8 font-black text-2xl py-3 rounded-2xl bg-green-100 text-green-700 opacity-100 shadow-sm'; 
            setTimeout(() => { catchModal.style.display = 'none'; paused = false; }, 800); 
        } else { 
            sfx.wrong(); score = Math.max(0, score-1); scoreEl.textContent = score;
            feedbackEl.textContent = 'เป้าหมายพลาด! ❌'; feedbackEl.className = 'mt-8 font-black text-2xl py-3 rounded-2xl bg-red-100 text-red-700 opacity-100 shadow-sm'; 
            document.getElementById('modalBox').classList.add('shake-hard'); 
            setTimeout(() => { if(catchModal.style.display !== 'none'){ document.getElementById('modalBox').classList.remove('shake-hard'); catchModal.style.display = 'none'; paused = false; } }, 1800); 
        } 
    }

    function catchFish(f, idx) { 
        paused = true; sfx.hitFish(); targetWordEl.textContent = f.word.word; modalScoreText.textContent = score; catchModal.style.display = 'flex'; feedbackEl.style.opacity = '0'; feedbackEl.classList.remove('opacity-100'); 
        let qt = 5.0; 
        const qTimer = setInterval(() => { if(!gameActive || !paused){ clearInterval(qTimer); return; } qt -= 0.1; qTimerBar.style.width = (qt/5)*100+'%'; modalTimer.textContent = qt.toFixed(1); if(qt <= 0){ clearInterval(qTimer); if(gameActive) checkAnswer("MISS"); } }, 100); 
        f.el.remove(); fishList.splice(idx, 1); 
    }

    function spawnProjectile(x, y, vx, vy, color, type) { const p = { x, y, vx, vy, el: document.createElement('div') }; p.el.className = 'projectile'; p.el.innerHTML = type === 'ink' ? `<svg width="24" height="24"><circle cx="12" cy="12" r="10" fill="${color}" stroke="#000" stroke-width="2"/></svg>` : `<svg width="40" height="20"><path d="M0,10 Q20,0 40,10 Q20,20 0,10" fill="none" stroke="${color}" stroke-width="4"/></svg>`; enemyProjectileTank.appendChild(p.el); enemyProjectileList.push(p); }

    function attemptShoot() { 
        if(!gameActive || paused || stunTime > 0) return; 
        const now = Date.now(); 
        if(now - lastShootTime >= SHOOT_COOLDOWN){ 
            sfx.shoot(); 
            const startX = player.x + (player.dir === 1 ? 120 : -40);
            const startY = player.y + 20; 
            const net = { x: startX, y: startY, vx: player.dir * 14, el: document.createElement('div') }; 
            net.el.className = 'net'; net.el.innerHTML = `<svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="28" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-width="3" stroke-dasharray="6,4"/><path d="M10,30 L50,30 M30,10 L30,50" stroke="#fff" stroke-width="3"/></svg>`; 
            netTank.appendChild(net.el); netList.push(net); lastShootTime = now; 
        } 
    }

    // --- Asset Spawners ---

    const fishTemplates = [
        { w: 120, h: 90, svg: (c) => `<svg viewBox="0 0 120 90"><path class="anim-fins-flow" d="M20,45 C-10,10 30,-20 50,20 C30,40 -10,100 20,45" fill="${c}" opacity="0.6"/><path class="anim-tail" d="M100,45 C130,0 150,45 130,90 C110,45 130,10 100,45" fill="${c}" opacity="0.7"/><ellipse cx="60" cy="45" rx="45" ry="18" fill="${c}" stroke="#000" stroke-width="2"/><circle cx="85" cy="38" r="6" fill="#fff"/><circle cx="88" cy="38" r="3" fill="#000"/></svg>` },
        { w: 110, h: 90, svg: (c) => `<svg viewBox="0 0 110 90"><path d="M80,30 Q95,0 105,25" fill="none" stroke="#fff" stroke-width="2"/><circle cx="105" cy="25" r="6" fill="#fbbf24"/><path d="M10,45 C10,15 90,10 100,45 C100,80 10,85 10,45" fill="${c}" stroke="#000" stroke-width="2"/><circle cx="35" cy="35" r="8" fill="#fff"/></svg>` },
        { w: 140, h: 60, svg: (c) => `<svg viewBox="0 0 140 60"><path d="M0,30 L45,30" stroke="#cbd5e1" stroke-width="5"/><path d="M45,30 C45,10 120,10 130,30 C120,50 45,50 45,30" fill="${c}" stroke="#000" stroke-width="2"/><path class="anim-tail" d="M130,30 L150,10 L140,30 L150,50 Z" fill="${c}" stroke="#000"/><circle cx="65" cy="25" r="5" fill="#fff"/></svg>` }
    ];

    function spawnFish() {
        if(fishList.length >= 8) return;
        const template = fishTemplates[Math.floor(Math.random() * fishTemplates.length)];
        const word = rawWordBank[Math.floor(Math.random() * rawWordBank.length)];
        const side = Math.random() > 0.5 ? 1 : -1;
        const color = `hsl(${Math.floor(Math.random() * 360)}, 70%, 60%)`;
        const fish = { x: side === 1 ? -250 : window.innerWidth + 250, y: Math.random()*(window.innerHeight-300)+200, vx: (Math.random()*1.5 + 1.5) * side, vy: (Math.random()-0.5) * 1.5, word, el: document.createElement('div') };
        fish.el.className = 'fish'; fish.el.style.width = template.w + 'px';
        const directionScale = fish.vx > 0 ? -1 : 1;
        fish.el.innerHTML = `<div class="fish-label">${word.word}</div><div style="transform: scaleX(${directionScale})">${template.svg(color)}</div>`;
        fishTank.appendChild(fish.el); fishList.push(fish);
    }

    function spawnEnemyShark() {
        const side = Math.random() > 0.5 ? 1 : -1;
        const isMega = gameDifficultyLevel >= 1;
        const shark = { x: side === 1 ? -300 : window.innerWidth + 300, y: Math.random() * (window.innerHeight - 300) + 150, vx: (Math.random() * 2 + 3) * side, shootTimer: 80, isMega: isMega, el: document.createElement('div') };
        shark.el.className = 'enemy-shark'; shark.el.style.width = '160px'; if(isMega) shark.el.style.transform = `scale(2)`;
        const orient = side === 1 ? -1 : 1;
        shark.el.innerHTML = `<div style="transform: scaleX(${orient})"><svg viewBox="0 0 150 80"><g class="anim-tail"><path d="M110,40 L145,10 L135,40 L145,70 Z" fill="#334155" stroke="#000" stroke-width="2"/></g><path d="M5,45 Q40,10 100,10 L115,40 L100,70 Q40,75 5,45" fill="#1e293b" stroke="#000" stroke-width="2"/><circle cx="25" cy="35" r="5" fill="#ef4444" class="shark-eye-glow"/></svg></div>`;
        enemyTank.appendChild(shark.el); enemySharkList.push(shark);
    }

    // --- GAME ENGINE ---

    function gameLoop() {
        if(!gameActive) return;
        if(!paused) {
            const cd = Math.min((Date.now() - lastShootTime) / SHOOT_COOLDOWN, 1);
            cooldownFill.style.strokeDashoffset = 100 - (cd * 100);
            shootBtn.disabled = cd < 1;

            if(stunTime > 0) stunTime--;
            else {
                let nx = player.x, ny = player.y;
                if(keyState['arrowup'] || keyState['w']) ny -= player.speed; if(keyState['arrowdown'] || keyState['s']) ny += player.speed;
                if(keyState['arrowleft'] || keyState['a']){ nx -= player.speed; player.dir = -1; }
                if(keyState['arrowright'] || keyState['d']){ nx += player.speed; player.dir = 1; }
                player.x = Math.max(0, Math.min(window.innerWidth-player.w, nx));
                player.y = Math.max(0, Math.min(window.innerHeight-player.h, ny));
            }
            playerEl.style.left = player.x+'px'; playerEl.style.top = player.y+'px';
            document.getElementById('subSvg').style.transform = `scaleX(${player.dir})`;

            // Physics Objects Logic
            for(let i=mineList.length-1; i>=0; i--){ const m=mineList[i]; m.x += m.vx; m.y += m.vy; m.el.style.left=m.x+'px'; m.el.style.top=m.y+'px'; if(!isInvincible && player.x<m.x+40 && player.x+player.w>m.x+10 && player.y<m.y+40 && player.y+player.h>m.y+10){ takeDamage(1,10); sfx.hitMine(); showPopup("-10วิ",m.x,m.y,"#ef4444"); m.el.remove(); mineList.splice(i,1); } else if(m.y>window.innerHeight+150 || m.x<-200 || m.x>window.innerWidth+200) { m.el.remove(); mineList.splice(i,1); } }
            enemySharkList.forEach((s, i) => { const scale = s.isMega ? 2 : 1; s.x += s.vx * (1 + gameDifficultyLevel * 0.1); s.el.style.left = s.x+'px'; s.el.style.top = s.y+'px'; if(s.shootTimer-- <= 0){ if(s.isMega){ for(let d=0; d<360; d+=45){ const r = d*(Math.PI/180); spawnProjectile(s.x + 80*scale, s.y + 40*scale, Math.cos(r)*5, Math.sin(r)*5, "#ef4444", 'wave'); } } else { spawnProjectile(s.x + (s.vx > 0 ? 160 : 0), s.y + 40, s.vx * 1.8, 0, "#38bdf8", 'wave'); } s.shootTimer = 130; } if(s.x < -400 || s.x > window.innerWidth + 400){ s.el.remove(); enemySharkList.splice(i,1); } });
            octopusList.forEach((o, i) => { o.x += o.vx; o.el.style.left = o.x+'px'; o.el.style.top = o.y+'px'; o.shootTimer -= (1 + gameDifficultyLevel * 0.2); if(o.shootTimer <= 0) { spawnProjectile(o.x + 40, o.y + 80, 0, 5, "#000", 'ink'); o.shootTimer = 150; } if(o.x < -200 || o.x > window.innerWidth + 200){ o.el.remove(); octopusList.splice(i,1); } });
            for(let i=enemyProjectileList.length-1; i>=0; i--){ const p=enemyProjectileList[i]; p.x+=p.vx; p.y+=p.vy; p.el.style.left=p.x+'px'; p.el.style.top=p.y+'px'; if(!isInvincible && player.x<p.x+20 && player.x+player.w>p.x && player.y<p.y+20 && player.y+player.h>p.y){ takeDamage(1,5); p.el.remove(); enemyProjectileList.splice(i,1); } else if(p.y>window.innerHeight+100 || p.x<-150 || p.x>window.innerWidth+150){ p.el.remove(); enemyProjectileList.splice(i,1); } }
            for(let i=fishList.length-1; i>=0; i--){ const f=fishList[i]; f.x+=f.vx; f.y+=f.vy; f.el.style.left=f.x+'px'; f.el.style.top=f.y+'px'; if(!isInvincible && player.x<f.x+80 && player.x+player.w>f.x+10 && player.y<f.y+50 && player.y+player.h>f.y+10){ takeDamage(1,0); showPopup("-1 ❤️", f.x, f.y, "#ef4444"); f.el.remove(); fishList.splice(i,1); } else if(f.x < -300 || f.x > window.innerWidth + 300) { f.el.remove(); fishList.splice(i,1); } }
            
            // Collision Nets
            for(let ni=netList.length-1; ni>=0; ni--) {
                const n=netList[ni]; n.x+=n.vx; n.el.style.left=n.x+'px'; n.el.style.top=n.y+'px';
                let removedNet = false;
                obstacleList.forEach(r => { if(n.x < r.x+r.w && n.x+50 > r.x && n.y < r.y+r.h && n.y+50 > r.y) { n.el.remove(); netList.splice(ni, 1); removedNet = true; } });
                if(removedNet) continue;
                for(let si=enemySharkList.length-1; si>=0; si--){ 
                    const s = enemySharkList[si]; const scale = s.isMega ? 2 : 1;
                    if(n.x < s.x + 160*scale && n.x + 50 > s.x && n.y < s.y + 80*scale && n.y + 50 > s.y){ showPopup(s.isMega ? "บอส!" : "กำจัด!",s.x,s.y,"#fff"); s.el.remove(); enemySharkList.splice(si,1); n.el.remove(); netList.splice(ni,1); removedNet=true; break; } 
                }
                if(removedNet) continue;
                for(let fi=fishList.length-1; fi>=0; fi--){ if(n.x<fishList[fi].x+100 && n.x+50>fishList[fi].x && n.y<fishList[fi].y+60 && n.y+50>fishList[fi].y){ catchFish(fishList[fi],fi); n.el.remove(); netList.splice(ni,1); removedNet=true; break; } }
                if(!removedNet && (n.x < -100 || n.x > window.innerWidth + 100)) { n.el.remove(); netList.splice(ni,1); }
            }
            obstacleList.forEach(r => { if(player.x+15<r.x+r.w && player.x+player.w-15>r.x && player.y+15<r.y+r.h && player.y+player.h-15>r.y){ stunTime=40; takeDamage(0,5); player.x-=player.dir*30; sfx.hitRock(); } });
        }
        requestAnimationFrame(gameLoop);
    }

    function initObstacles() {
        obstacleTank.innerHTML = ''; obstacleList = [];
        for(let i=0; i<4; i++) {
            let rx, ry, tooClose = true;
            while(tooClose) { rx = Math.random()*(window.innerWidth-120); ry = Math.random()*(window.innerHeight-300)+150; const dx = rx - (window.innerWidth/2); if(Math.sqrt(dx*dx) > 220) tooClose = false; }
            const rock = { x: rx, y: ry, w: 120, h: 100 };
            const el = document.createElement('div'); el.className = 'rock'; el.style.left = rock.x+'px'; el.style.top = rock.y+'px';
            el.innerHTML = `<svg viewBox="0 0 120 100" width="120"><path d="M10,90 Q20,10 60,30 Q100,10 110,90 Z" fill="#334155" stroke="#0f172a" stroke-width="3"/><path d="M30,30 L20,5 L45,25 M75,25 L100,5 L90,30" fill="#1e293b" stroke="#0f172a" stroke-width="2"/></svg>`;
            obstacleTank.appendChild(el); obstacleList.push(rock);
        }
    }

    function startGame() {
        gameActive = true; paused = false; lives = 5; score = 0; timeLeft = 100; gameDifficultyLevel = 0;
        timeToNextDifficulty = 30; currentDifficultyInterval = 30; // Reset difficulty state
        document.getElementById('difficultyLabel').textContent = `ความยากถัดไป: ${timeToNextDifficulty} วิ`;
        player.x = window.innerWidth / 2 - 70; player.y = window.innerHeight / 2 - 50;
        updateLivesUI(); initObstacles();
        fishTank.innerHTML = ''; netTank.innerHTML = ''; enemyTank.innerHTML = ''; enemyProjectileTank.innerHTML = ''; oxygenTank.innerHTML = ''; mineTank.innerHTML = '';
        requestAnimationFrame(gameLoop);
        
        mainTimerInterval = setInterval(() => { 
            if(gameActive && !paused) { 
                timeLeft--; 
                timerEl.textContent = timeLeft; 
                
                // Adaptive Difficulty Logic (30, 60, 90...)
                timeToNextDifficulty--;
                if(timeToNextDifficulty <= 0) {
                    gameDifficultyLevel++;
                    currentDifficultyInterval += 30; // Interval grows: 30 -> 60 -> 90...
                    timeToNextDifficulty = currentDifficultyInterval;
                    showPopup("ระดับความยากเพิ่มขึ้น! ⚠️", window.innerWidth/2, window.innerHeight/2, "#f87171");
                    playSfx(400, 'sawtooth', 0.5, 0.4);
                }
                document.getElementById('difficultyLabel').textContent = `ความยากถัดไป: ${timeToNextDifficulty} วิ`;

                if(timeLeft <= 0) endGame("หมดเวลา!"); 
            } 
        }, 1000);

        spawnIntervals.push(setInterval(() => { if(gameActive && !paused) spawnFish(); }, 2500));
        spawnIntervals.push(setInterval(() => { if(gameActive && !paused) {
            const side = Math.floor(Math.random() * 3); 
            let mx, my, mvx, mvy;
            if (side === 0) { mx = Math.random() * (window.innerWidth - 60); my = -100; mvx = 0; mvy = 2 + Math.random() * 2; } 
            else if (side === 1) { mx = -100; my = Math.random() * (window.innerHeight - 200) + 100; mvx = 2 + Math.random() * 2; mvy = (Math.random() - 0.5) * 1.5; } 
            else { mx = window.innerWidth + 100; my = Math.random() * (window.innerHeight - 200) + 100; mvx = -(2 + Math.random() * 2); mvy = (Math.random() - 0.5) * 1.5; }
            const mine = { x: mx, y: my, vx: mvx, vy: mvy, el: document.createElement('div') };
            mine.el.className = 'mine'; mine.el.style.width = '60px';
            mine.el.innerHTML = `<svg viewBox="0 0 80 80"><g stroke="#000" stroke-width="4"><path d="M40,0 L40,80 M0,40 L80,40 M12,12 L68,68 M12,68 L68,12"/></g><circle cx="40" cy="40" r="25" fill="#1f2937" stroke="#000" stroke-width="2"/><circle class="mine-light" cx="40" cy="40" r="6" fill="#ef4444"/></svg>`;
            mineTank.appendChild(mine.el); mineList.push(mine);
        } }, 5000));
        spawnIntervals.push(setInterval(() => { if(gameActive && !paused) spawnEnemyShark(); }, 6000));
    }

    // --- Init UI ---
    (function initUI() {
        const grid = document.getElementById('categoryGrid');
        grid.innerHTML = '';
        categories.forEach((cat, idx) => {
            const btn = document.createElement('button');
            btn.className = 'category-btn relative py-5 rounded-2xl text-sky-900 text-sm md:text-base font-bold shadow-sm flex items-center justify-center';
            btn.innerHTML = `<span class="key-label">${idx + 1}</span>${cat}`;
            btn.addEventListener('click', (e) => { e.preventDefault(); checkAnswer(cat); });
            grid.appendChild(btn);
        });
    })();

    // --- Event Listeners ---
    finalStartBtn.addEventListener('click', () => {
        playerName = document.getElementById('playerNameInput').value.trim() || "กัปตัน";
        document.getElementById('startScreen').classList.add('hidden');
        countdownEl.style.display = 'block';
        let count = 3;
        const cl = () => { countdownEl.textContent = count; sfx.countdown(300 + (count * 100)); if(count > 0){ count--; setTimeout(cl, 1000); } else { countdownEl.textContent = "ลุย!"; sfx.countdown(800); setTimeout(() => { countdownEl.style.display = 'none'; startGame(); }, 800); } };
        cl();
    });

    retryBtn.addEventListener('click', () => location.reload());
    window.addEventListener('keydown', e => { 
        const k = e.key.toLowerCase(); keyState[k] = true; 
        if(k === ' ') { e.preventDefault(); attemptShoot(); } 
        if(gameActive && paused && !feedbackEl.classList.contains('opacity-100')){ 
            const num = parseInt(k); if(num >= 1 && num <= 9) checkAnswer(categories[num - 1]);
        }
    });
    window.addEventListener('keyup', e => { keyState[e.key.toLowerCase()] = false; });
    const bD = (id, k) => { const el = document.getElementById(id); if(!el) return; el.addEventListener('touchstart', (e) => { e.preventDefault(); keyState[k] = true; }, {passive:false}); el.addEventListener('touchend', (e) => { e.preventDefault(); keyState[k] = false; }, {passive:false}); el.addEventListener('mousedown', () => keyState[k] = true); el.addEventListener('mouseup', () => keyState[k] = false); };
    bD('btnUp', 'arrowup'); bD('btnDown', 'arrowdown'); bD('btnLeft', 'arrowleft'); bD('btnRight', 'arrowright');
    shootBtn.addEventListener('click', (e) => { e.preventDefault(); attemptShoot(); });

    setInterval(() => { if(gameActive && !paused){ const b = document.createElement('div'); b.className = 'bubble'; b.style.left = Math.random()*100+'vw'; b.style.width = b.style.height = (Math.random()*18+6)+'px'; b.style.setProperty('--duration', (Math.random()*4+4)+'s'); document.getElementById('gameArea').appendChild(b); setTimeout(() => b.remove(), 8000); } }, 400);
</script>
</body>
</html>
