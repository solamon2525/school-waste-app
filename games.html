<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>เกมส์การเรียนรู้ • บ้านคำไผ่</title>
    <meta name="description"
        content="มินิเกมส์การเรียนรู้ วิชาภาษาไทย คณิตศาสตร์ เทคโนโลยี และเกม AR โรงเรียนบ้านคำไผ่" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #020b18;
            --surface: rgba(14, 165, 233, .07);
            --border: rgba(14, 165, 233, .18);
            --text: #e0f2fe;
            --muted: #64748b;
            --accent: #22d3ee;
        }

        body {
            font-family: Sarabun, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── BG ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(160deg, #020b18 0%, #031a2e 50%, #020b18 100%);
        }

        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .15;
            pointer-events: none;
        }

        .g1 {
            width: 500px;
            height: 500px;
            background: #0891b2;
            top: -150px;
            left: -100px;
        }

        .g2 {
            width: 400px;
            height: 400px;
            background: #7c3aed;
            bottom: -100px;
            right: -100px;
        }

        .g3 {
            width: 300px;
            height: 300px;
            background: #0ea5e9;
            top: 40%;
            left: 40%;
            opacity: .1;
        }

        /* particles */
        .ptcl {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .pt {
            position: absolute;
            animation: ptFloat linear infinite;
            opacity: 0;
        }

        @keyframes ptFloat {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: .5;
            }

            90% {
                opacity: .4;
            }

            100% {
                transform: translateY(-80px) rotate(360deg);
                opacity: 0;
            }
        }

        /* ── WRAP ── */
        .wrap {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: 20px 16px 80px;
        }

        /* ── HEADER ── */
        .page-header {
            padding: 24px 0 8px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .back-btn {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            color: #94a3b8;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            transition: all .2s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, .12);
            color: #fff;
        }

        .header-info {
            flex: 1;
        }

        .page-title {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, #22d3ee, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ── SEARCH ── */
        .search-wrap {
            position: relative;
            margin: 16px 0;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 14px;
            padding: 11px 16px 11px 42px;
            color: var(--text);
            font-size: 14px;
            font-family: Sarabun, sans-serif;
            outline: none;
            transition: border-color .2s;
        }

        .search-input:focus {
            border-color: rgba(34, 211, 238, .4);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: .5;
        }

        /* ── SUBJECT TABS ── */
        .subject-tabs {
            display: flex;
            gap: 8px;
            margin: 8px 0 20px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .subject-tabs::-webkit-scrollbar {
            display: none;
        }

        .stab {
            flex-shrink: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 7px 16px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
            font-family: Sarabun, sans-serif;
        }

        .stab.active {
            background: rgba(34, 211, 238, .15);
            border-color: #22d3ee;
            color: #22d3ee;
        }

        .stab:hover:not(.active) {
            border-color: rgba(34, 211, 238, .3);
            color: #94a3b8;
        }

        /* ── SECTION TITLE ── */
        .sec-title {
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin: 24px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sec-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, .06);
        }

        /* ── GAME GRID ── */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media(min-width:600px) {
            .game-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* ── GAME CARD ── */
        .game-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 14px 14px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
            transition: transform .2s, border-color .2s, box-shadow .2s;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background: var(--card-glow, transparent);
            opacity: 0;
            transition: opacity .3s;
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: rgba(34, 211, 238, .4);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .3);
        }

        .game-card:hover::before {
            opacity: 1;
        }

        .game-emoji {
            font-size: 32px;
            display: block;
            transition: transform .2s;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, .3));
        }

        .game-card:hover .game-emoji {
            transform: scale(1.2) rotate(-6deg);
        }

        .game-name {
            font-size: 13px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.35;
        }

        .game-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            width: fit-content;
        }

        .game-arr {
            position: absolute;
            bottom: 12px;
            right: 12px;
            color: #374151;
            font-size: 14px;
            transition: all .2s;
        }

        .game-card:hover .game-arr {
            color: var(--accent);
            transform: translateX(3px);
        }

        /* Subject tag colors */
        .tag-thai {
            background: rgba(251, 191, 36, .12);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, .25);
        }

        .tag-math {
            background: rgba(74, 222, 128, .12);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, .25);
        }

        .tag-tech {
            background: rgba(167, 139, 250, .12);
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, .25);
        }

        .tag-ar {
            background: rgba(251, 113, 133, .12);
            color: #fb7185;
            border: 1px solid rgba(251, 113, 133, .25);
        }

        .tag-tool {
            background: rgba(34, 211, 238, .12);
            color: #22d3ee;
            border: 1px solid rgba(34, 211, 238, .25);
        }

        .tag-exam {
            background: rgba(249, 115, 22, .12);
            color: #f97316;
            border: 1px solid rgba(249, 115, 22, .25);
        }

        /* Card accent per subject */
        .card-thai {
            --card-glow: linear-gradient(135deg, rgba(251, 191, 36, .06), transparent);
        }

        .card-math {
            --card-glow: linear-gradient(135deg, rgba(74, 222, 128, .06), transparent);
        }

        .card-tech {
            --card-glow: linear-gradient(135deg, rgba(167, 139, 250, .06), transparent);
        }

        .card-ar {
            --card-glow: linear-gradient(135deg, rgba(251, 113, 133, .06), transparent);
        }

        .card-tool {
            --card-glow: linear-gradient(135deg, rgba(34, 211, 238, .06), transparent);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-txt {
            font-size: 16px;
            font-weight: 700;
            color: #94a3b8;
        }

        /* ── COUNT BADGE ── */
        .count-badge {
            background: rgba(34, 211, 238, .12);
            border: 1px solid rgba(34, 211, 238, .2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #22d3ee;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* ── FOOTER ── */
        .page-footer {
            text-align: center;
            font-size: 12px;
            color: #2d3748;
            margin-top: 32px;
        }

        /* ── FAB ── */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 20px;
            z-index: 100;
            background: rgba(8, 145, 178, .2);
            border: 1px solid rgba(34, 211, 238, .3);
            color: #22d3ee;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all .2s;
            backdrop-filter: blur(10px);
        }

        .fab:hover {
            background: rgba(8, 145, 178, .4);
            transform: translateY(-2px);
        }

        /* ── HIDDEN ── */
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="bg-layer"></div>
    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="glow g3"></div>
    <div class="ptcl" id="ptcl"></div>

    <div class="wrap">

        <!-- Header -->
        <div class="page-header">
            <a class="back-btn" href="index.html" title="กลับหน้าหลัก">←</a>
            <div class="header-info">
                <div class="page-title">🎮 เกมส์การเรียนรู้</div>
                <div class="page-sub">มินิเกมส์ฝึกทักษะ • โรงเรียนบ้านคำไผ่ • ครูตุ้ม</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" id="search-input" type="text" placeholder="ค้นหาเกมส์..."
                oninput="filterGames()" autocomplete="off" />
        </div>

        <!-- Subject Tabs -->
        <div class="subject-tabs" id="subject-tabs">
            <button class="stab active" data-cat="all" onclick="setTab(this,'all')">🗂️ ทั้งหมด</button>
            <button class="stab" data-cat="thai" onclick="setTab(this,'thai')">🇹🇭 ภาษาไทย</button>
            <button class="stab" data-cat="math" onclick="setTab(this,'math')">🔢 คณิตศาสตร์</button>
            <button class="stab" data-cat="ar" onclick="setTab(this,'ar')">🥽 เกม AR</button>
            <button class="stab" data-cat="tech" onclick="setTab(this,'tech')">💻 เทคโนโลยี</button>
            <button class="stab" data-cat="tool" onclick="setTab(this,'tool')">🛠️ เครื่องมือ</button>
            <button class="stab" data-cat="exam" onclick="setTab(this,'exam')">📝 สอบ</button>
        </div>

        <!-- Game container -->
        <div id="game-container"></div>

        <div class="page-footer">🎮 เกมส์การเรียนรู้ บ้านคำไผ่ • พัฒนาโดย ครูณัฐพงศ์ สิงห์ชมภู</div>
    </div>

    <div class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="กลับขึ้นบน">↑</div>

    <script>
        // ═══════════════════════════════════════════════════
        //  GAME DATA
        // ═══════════════════════════════════════════════════
        const GAMES = [
            // ─── ภาษาไทย ───
            { id: 'g1', cat: 'thai', emoji: '🎣', name: 'ตกปลามาตรา ตัวสะกด', url: 'https://gemini.google.com/share/c601ecba61e3' },
            { id: 'g2', cat: 'thai', emoji: '📖', name: 'คำไวพจน์', url: 'games/camwaipot.html' },
            { id: 'g3', cat: 'thai', emoji: '⚔️', name: 'Attack on คำนาม', url: 'https://gemini.google.com/share/ecc7dac430d6' },
            { id: 'g4', cat: 'thai', emoji: '🔫', name: 'สงครามรถถังชิงดินแดนคำนาม', url: 'https://gemini.google.com/share/2dd7d3327bb6' },
            { id: 'g5', cat: 'thai', emoji: '🌀', name: 'วงล้อซ่อนหา อักษรนำ', url: 'https://gemini.google.com/share/65196b5639a5' },
            { id: 'g6', cat: 'thai', emoji: '🚗', name: 'มอไซต์จอมลุยมาตรา', url: 'https://gemini.google.com/share/fd091b00ffe1' },
            { id: 'g7', cat: 'thai', emoji: '🐦', name: 'Flappy Bird ภารกิจพิชิตมาตรา', url: 'https://gemini.google.com/share/bd1497c4c611' },
            { id: 'g8', cat: 'thai', emoji: '🐍', name: 'งูผู้หิวโหย มาตราตัวสะกด', url: 'https://gemini.google.com/share/9eeda4905b33' },
            { id: 'g9', cat: 'thai', emoji: '🔫', name: 'รถถังหาศัพท์ Battle City', url: 'https://gemini.google.com/share/556e02d04d9f' },
            { id: 'g10', cat: 'thai', emoji: '🕵️', name: 'มือปราบคำผิด', url: 'https://gemini.google.com/share/25f70eebc709' },
            { id: 'g11', cat: 'thai', emoji: '✨', name: 'มหาศึกอักขระเวท', url: 'https://gemini.google.com/share/dcd4ef444f78' },
            { id: 'g12', cat: 'thai', emoji: '🥷', name: 'Shinobi: นินจากระต่ายล่าคำนาม', url: 'https://gemini.google.com/share/80a50e5f0bbb' },
            { id: 'g13', cat: 'thai', emoji: '🗡️', name: 'ศึกจอมเวทแห่งภาษา', url: 'https://gemini.google.com/share/48ef6ce67ce1' },
            { id: 'g14', cat: 'thai', emoji: '🛡️', name: 'Word Shield | โล่คำศัพท์พิทักษ์โลก', url: 'https://gemini.google.com/share/47563e7108cf' },

            // ─── คณิตศาสตร์ ───
            { id: 'm1', cat: 'math', emoji: '🧠', name: 'เจ้าหนูคิดไว Math Jumper', url: 'https://gemini.google.com/share/aee7dcd29e8b' },
            { id: 'm2', cat: 'math', emoji: '🃏', name: 'เกม 24', url: 'https://gemini.google.com/share/82c577f40612' },
            { id: 'm3', cat: 'math', emoji: '🍕', name: 'Pizza Master Chef ล่าเศษส่วน', url: 'https://gemini.google.com/share/90ff2781996e' },
            { id: 'm4', cat: 'math', emoji: '🏰', name: 'ศึกจอมปราชญ์ราชสำนัก', url: 'https://gemini.google.com/share/c33340bcdb09' },
            { id: 'm5', cat: 'math', emoji: '🔫', name: 'รถถังเศษส่วน', url: 'https://gemini.google.com/share/aa9e0f96e63b' },
            { id: 'm6', cat: 'math', emoji: '🚀', name: 'Super Math-Blaster', url: 'https://gemini.google.com/share/f652d6c1b20d' },
            { id: 'm7', cat: 'math', emoji: '🕵️', name: 'นักสืบโจทย์ปัญหา', url: 'https://gemini.google.com/share/f6dada7b3843' },
            { id: 'm8', cat: 'math', emoji: '🏰', name: 'ป้อมปราการนักคำนวณ', url: 'https://gemini.google.com/share/8037b3d34aa1' },
            { id: 'm9', cat: 'math', emoji: '📖', name: 'เกมคำไวพจน์ (คณิต)', url: 'https://gemini.google.com/share/ce86dbf63d6c' },

            // ─── เกม AR ───
            { id: 'a1', cat: 'ar', emoji: '🏃', name: 'Math Body Motion Game', url: 'https://gemini.google.com/share/72c1b0291220' },
            { id: 'a2', cat: 'ar', emoji: '👑', name: 'Royal Jumper', url: 'https://gemini.google.com/share/fec4cadc4a24' },
            { id: 'a3', cat: 'ar', emoji: '📖', name: 'เกมคำไวพจน์ AR', url: 'https://gemini.google.com/share/14048793a5ad' },
            { id: 'a4', cat: 'ar', emoji: '🔤', name: 'เกมสะกดภาษาไทย AR', url: 'https://claude.ai/public/artifacts/88047b72-a9c4-4f3e-817c-2eba5334ec6d' },

            // ─── เทคโนโลยี ───
            { id: 't1', cat: 'tech', emoji: '🪐', name: 'ระบบสุริยะ', url: 'https://gemini.google.com/share/4c55b48f9d00' },

            // ─── เครื่องมือ ───
            { id: 'l1', cat: 'tool', emoji: '⌨️', name: 'ฝึกพิมพ์ Typing Study', url: 'https://www.typingstudy.com/' },
            { id: 'l2', cat: 'tool', emoji: '🧩', name: 'Blockly Games', url: 'https://blockly.games/?lang=th' },

            // ─── สอบ ───
            { id: 'e1', cat: 'exam', emoji: '📝', name: 'ระบบสอบออนไลน์', url: 'https://solamon2525.github.io/exam-system/' },
        ];

        // tag labels & classes
        const CAT_META = {
            thai: { label: 'ภาษาไทย', tagClass: 'tag-thai', cardClass: 'card-thai' },
            math: { label: 'คณิตศาสตร์', tagClass: 'tag-math', cardClass: 'card-math' },
            ar: { label: 'AR', tagClass: 'tag-ar', cardClass: 'card-ar' },
            tech: { label: 'เทคโนโลยี', tagClass: 'tag-tech', cardClass: 'card-tech' },
            tool: { label: 'เครื่องมือ', tagClass: 'tag-tool', cardClass: 'card-tool' },
            exam: { label: 'สอบ', tagClass: 'tag-exam', cardClass: 'card-tool' },
        };

        const SECTION_ORDER = ['thai', 'math', 'ar', 'tech', 'tool', 'exam'];
        const SECTION_LABELS = {
            thai: '🇹🇭 ภาษาไทย', math: '🔢 คณิตศาสตร์', ar: '🥽 เกม AR',
            tech: '💻 เทคโนโลยี', tool: '🛠️ เครื่องมือ', exam: '📝 สอบ'
        };

        let currentCat = 'all';
        let searchQ = '';

        // ═══════════════════════════════════════════════════
        //  RENDER
        // ═══════════════════════════════════════════════════
        function render() {
            const q = searchQ.toLowerCase().trim();
            let visible = GAMES.filter(g => {
                const matchCat = currentCat === 'all' || g.cat === currentCat;
                const matchQ = !q || g.name.toLowerCase().includes(q) || g.cat.includes(q);
                return matchCat && matchQ;
            });

            const container = document.getElementById('game-container');

            if (!visible.length) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">🎮</div><div class="empty-txt">ไม่พบเกมส์ที่ค้นหา</div></div>`;
                return;
            }

            let html = '';

            if (currentCat === 'all' && !q) {
                // grouped by section
                SECTION_ORDER.forEach(cat => {
                    const items = visible.filter(g => g.cat === cat);
                    if (!items.length) return;
                    html += `<div class="sec-title">${SECTION_LABELS[cat]} <span class="count-badge">${items.length}</span></div>`;
                    html += renderGrid(items);
                });
            } else {
                html += renderGrid(visible);
            }

            container.innerHTML = html;
        }

        function renderGrid(items) {
            const cards = items.map(g => {
                const meta = CAT_META[g.cat];
                return `<a class="game-card ${meta.cardClass}" href="${g.url}" target="_blank" rel="noopener" title="${g.name}">
          <span class="game-emoji">${g.emoji}</span>
          <div class="game-name">${g.name}</div>
          <span class="game-tag ${meta.tagClass}">${meta.label}</span>
          <span class="game-arr">→</span>
        </a>`;
            }).join('');
            return `<div class="game-grid">${cards}</div>`;
        }

        // ═══════════════════════════════════════════════════
        //  FILTER CONTROLS
        // ═══════════════════════════════════════════════════
        function setTab(el, cat) {
            document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentCat = cat;
            render();
        }

        function filterGames() {
            searchQ = document.getElementById('search-input').value;
            render();
        }

        // ═══════════════════════════════════════════════════
        //  PARTICLES
        // ═══════════════════════════════════════════════════
        const EMOJIS = ['🎮', '⭐', '✨', '🌟', '🎯', '🏆', '🎲', '💡', '🎪', '🌸'];
        const pw = document.getElementById('ptcl');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'pt';
            p.textContent = EMOJIS[~~(Math.random() * EMOJIS.length)];
            p.style.cssText = `left:${Math.random() * 100}%;font-size:${11 + Math.random() * 14}px;animation-duration:${10 + Math.random() * 14}s;animation-delay:${Math.random() * 12}s`;
            pw.appendChild(p);
        }

        // init
        render();
    </script>
</body>

</html>
